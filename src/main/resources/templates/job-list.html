<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Browse Jobs - CareerFlow')}">
<body>
    <div th:fragment="content">
        <div style="padding: 4rem 5%;">
            <header style="margin-bottom: 3rem; text-align: center;">
                <h1>Explore Opportunities</h1>
                <p style="color: var(--text-muted);">Find the perfect role that matches your skills and passion.</p>
            </header>

            <div style="display: grid; grid-template-columns: 300px 1fr; gap: 2rem;">
                <!-- Filter Sidebar -->
                <aside>
                    <div class="card" style="position: sticky; top: 100px;">
                        <h3>Filter Jobs</h3>
                        <form th:action="@{/jobs}" method="get" style="margin-top: 1.5rem;">
                            <div class="form-group">
                                <label>Category</label>
                                <select name="category" class="form-control" style="background: var(--surface)">
                                    <option value="">All Categories</option>
                                    <option value="Engineering">Engineering</option>
                                    <option value="Design">Design</option>
                                    <option value="Marketing">Marketing</option>
                                    <option value="Sales">Sales</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Location</label>
                                <input type="text" name="location" class="form-control" placeholder="City or Remote">
                            </div>
                            <div class="form-group">
                                <label>Experience</label>
                                <select name="experience" class="form-control" style="background: var(--surface)">
                                    <option value="">Any Level</option>
                                    <option value="Entry Level">Entry Level</option>
                                    <option value="Mid Level">Mid Level</option>
                                    <option value="Senior Level">Senior Level</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary" style="width: 100%;">Apply Filters</button>
                            <a th:href="@{/jobs}" class="btn btn-outline" style="width: 100%; margin-top: 0.5rem;">Clear All</a>
                        </form>
                    </div>
                </aside>

                <!-- Job Listings -->
                <div style="display: grid; gap: 1.5rem;">
                    <div th:each="job : ${jobs}" class="card" style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h3 th:text="${job.title}">Senior Developer</h3>
                            <p style="color: var(--primary); font-weight: 600;" th:text="${job.employer.name}">TechCorp</p>
                            <div style="margin-top: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">
                                <span th:text="${job.location}">Remote</span> &bull; 
                                <span th:text="'$' + ${#numbers.formatDecimal(job.salary, 0, 'COMMA', 0, 'POINT')}">Salary</span> &bull;
                                <span th:text="${job.experience}">Mid Level</span>
                            </div>
                        </div>
                        <a th:href="@{/jobs/{id}(id=${job.id})}" class="btn btn-outline">Apply Now</a>
                    </div>
                    
                    <div th:if="${#lists.isEmpty(jobs)}" style="text-align: center; padding: 4rem;">
                        <img th:src="@{/images/no-results.svg}" alt="No results" style="width: 200px; opacity: 0.3;">
                        <h3 style="margin-top: 1rem; color: var(--text-muted);">No jobs found matching your criteria.</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
