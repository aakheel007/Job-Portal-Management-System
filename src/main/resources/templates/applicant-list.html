<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Applicants - ' + ${job.title})}">
<body>
    <div th:fragment="content" style="padding: 4rem 5%;">
        <header style="margin-bottom: 3rem;">
            <a th:href="@{/employer/dashboard}" style="color: var(--primary); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
            <h1 th:text="'Applicants for ' + ${job.title}">Applicants</h1>
            <p style="color: var(--text-muted);" th:text="${job.location} + ' &bull; ' + ${#lists.size(applicants)} + ' total applications'"></p>
        </header>

        <div class="card" style="padding: 0; overflow: hidden;">
            <table>
                <thead>
                    <tr>
                        <th>Candidate Name</th>
                        <th>Email</th>
                        <th>Applied Date</th>
                        <th>Resume</th>
                        <th>Current Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="app : ${applicants}">
                        <td th:text="${app.student.name}" style="font-weight: 600;">John Doe</td>
                        <td th:text="${app.student.email}">john@example.com</td>
                        <td th:text="${#temporals.format(app.appliedAt, 'dd MMM yyyy')}">15 Apr 2024</td>
                        <td>
                            <a th:href="'/uploads/' + ${app.resumePath}" target="_blank" style="color: var(--primary);"><i class="fas fa-file-pdf"></i> View Resume</a>
                        </td>
                        <td>
                            <span th:class="'badge badge-' + ${#strings.toLowerCase(app.status)}" th:text="${app.status}">APPLIED</span>
                        </td>
                        <td>
                            <form th:action="@{/applications/{id}/status(id=${app.id})}" method="post" style="display: flex; gap: 0.5rem;">
                                <input type="hidden" name="jobId" th:value="${job.id}">
                                <button type="submit" name="status" value="SHORTLISTED" class="btn" style="padding: 0.25rem 0.5rem; background: var(--success); color: white; font-size: 0.75rem;">Shortlist</button>
                                <button type="submit" name="status" value="REJECTED" class="btn" style="padding: 0.25rem 0.5rem; background: var(--danger); color: white; font-size: 0.75rem;">Reject</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(applicants)}">
                        <td colspan="6" style="text-align: center; padding: 4rem; color: var(--text-muted);">No one has applied for this job yet.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
