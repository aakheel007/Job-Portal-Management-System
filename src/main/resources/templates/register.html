<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Register - CareerFlow')}">
<body>
    <div th:fragment="content" style="max-width: 500px; margin: 5rem auto; padding: 0 1rem;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Create Account</h2>
            
            <form th:action="@{/register}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" class="form-control" placeholder="John Doe" required>
                    <p th:if="${#fields.hasErrors('name')}" th:errors="*{name}" style="color: var(--danger); font-size: 0.8rem;"></p>
                </div>
                
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" class="form-control" placeholder="john@example.com" required>
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" style="color: var(--danger); font-size: 0.8rem;"></p>
                </div>
                
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" class="form-control" placeholder="At least 6 characters" required>
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" style="color: var(--danger); font-size: 0.8rem;"></p>
                </div>

                <div class="form-group">
                    <label>I am a:</label>
                    <select th:field="*{role}" class="form-control" required style="background: var(--surface)">
                        <option value="STUDENT">Student / Job Seeker</option>
                        <option value="EMPLOYER">Employer / Recruiter</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Already have an account? <a th:href="@{/login}" style="color: var(--primary);">Login</a>
            </p>
        </div>
    </div>
</body>
</html>
