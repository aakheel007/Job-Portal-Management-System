<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Employer Dashboard - CareerFlow')}">
<body>
    <div th:fragment="content">
        <div class="dashboard-container">
            <aside class="sidebar">
                <nav-side>
                    <h3 style="margin-bottom: 2rem; color: var(--primary);">Employer Hub</h3>
                    <ul style="list-style: none;">
                        <li style="margin-bottom: 1rem;"><a th:href="@{/employer/dashboard}" style="color: var(--primary); text-decoration: none; font-weight: 700;">My Postings</a></li>
                        <li style="margin-bottom: 1rem;"><a th:href="@{/jobs/new}" style="color: var(--text); text-decoration: none;">Post a Job</a></li>
                    </ul>
                </nav-side>
            </aside>

            <main class="main-content">
                <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h1 th:text="'Welcome, ' + ${user.name}">Welcome, Employer</h1>
                        <p style="color: var(--text-muted);">Manage your job listings and applicants.</p>
                    </div>
                    <a th:href="@{/jobs/new}" class="btn btn-primary">Post New Job</a>
                </header>

                <div class="stats-grid">
                    <div class="stat-card">
                        <p>Total Postings</p>
                        <h3 th:text="${#lists.size(jobs)}">0</h3>
                    </div>
                </div>

                <div class="card" style="padding: 0; overflow: hidden;">
                    <div style="padding: 1.5rem; border-bottom: 1px solid var(--glass-border);">
                        <h3>Recent Job Postings</h3>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Job Title</th>
                                    <th>Location</th>
                                    <th>Posted On</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="job : ${jobs}">
                                    <td th:text="${job.title}">Software Engineer</td>
                                    <td th:text="${job.location}">Remote</td>
                                    <td th:text="${#temporals.format(job.postedAt, 'dd MMM yyyy')}">10 Apr 2024</td>
                                    <td>
                                        <a th:href="@{/applicants/{id}(id=${job.id})}" class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.8rem;">View Applicants</a>
                                        <a th:href="@{/jobs/edit/{id}(id=${job.id})}" style="color: var(--warning); margin-left: 0.5rem;"><i class="fas fa-edit"></i></a>
                                        <a th:href="@{/jobs/delete/{id}(id=${job.id})}" style="color: var(--danger); margin-left: 0.5rem;" onclick="return confirm('Delete this job?')"><i class="fas fa-trash"></i></a>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(jobs)}">
                                    <td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-muted);">No jobs posted yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
