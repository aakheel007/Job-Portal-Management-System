<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Admin Dashboard - CareerFlow')}">
<body>
    <div th:fragment="content">
        <div class="dashboard-container">
            <aside class="sidebar">
                <nav-side>
                    <h3 style="margin-bottom: 2rem; color: var(--primary);">Admin Board</h3>
                    <ul style="list-style: none;">
                        <li style="margin-bottom: 1rem;"><a th:href="@{/admin/dashboard}" style="color: var(--primary); text-decoration: none; font-weight: 700;">Overview</a></li>
                        <li style="margin-bottom: 1rem;"><a th:href="@{/admin/users}" style="color: var(--text); text-decoration: none;">Manage Users</a></li>
                        <li style="margin-bottom: 1rem;"><a th:href="@{/admin/jobs}" style="color: var(--text); text-decoration: none;">Manage Jobs</a></li>
                    </ul>
                </nav-side>
            </aside>

            <main class="main-content">
                <header style="margin-bottom: 2rem;">
                    <h1>Platform Analytics</h1>
                    <p style="color: var(--text-muted);">Overview of platform performance and activity.</p>
                </header>

                <div class="stats-grid">
                    <div class="stat-card">
                        <p>Students</p>
                        <h3 th:text="${totalStudents}">0</h3>
                    </div>
                    <div class="stat-card">
                        <p>Employers</p>
                        <h3 th:text="${totalEmployers}">0</h3>
                    </div>
                    <div class="stat-card">
                        <p>Total Jobs</p>
                        <h3 th:text="${totalJobs}">0</h3>
                    </div>
                    <div class="stat-card">
                        <p>Applications</p>
                        <h3 th:text="${totalApplications}">0</h3>
                    </div>
                </div>

                <div class="card">
                    <h3>Shortlisted Rate</h3>
                    <div style="height: 10px; width: 100%; background: var(--surface); border-radius: 5px; margin: 1rem 0;">
                        <div th:style="'height: 100%; background: var(--success); border-radius: 5px; width: ' + (${totalApplications} > 0 ? (${shortlistedCount} * 100 / ${totalApplications}) : 0) + '%'"></div>
                    </div>
                    <p th:text="${shortlistedCount} + ' candidates shortlisted out of ' + ${totalApplications} + ' applications.'"></p>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
