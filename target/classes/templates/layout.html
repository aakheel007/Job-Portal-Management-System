<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" th:fragment="layout(content, title)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">JobPortal - Elevate Your Career</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
    <nav>
        <a th:href="@{/}" class="logo">CareerFlow</a>
        <ul class="nav-links">
            <li><a th:href="@{/jobs}">Jobs</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/login}">Login</a></li>
            <li sec:authorize="isAnonymous()"><a th:href="@{/register}" class="btn btn-primary">Register</a></li>
            
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/dashboard}">Dashboard</a>
            </li>
            <li sec:authorize="isAuthenticated()">
                <a th:href="@{/logout}">Logout</a>
            </li>
        </ul>
    </nav>

    <div th:replace="${content}"></div>

    <footer style="padding: 4rem 5%; text-align: center; border-top: 1px solid var(--glass-border); margin-top: 4rem;">
        <p>&copy; 2024 CareerFlow Job Portal. Built with Spring Boot & Thymeleaf.</p>
    </footer>

    <script th:src="@{/js/main.js}"></script>
</body>
</html>
