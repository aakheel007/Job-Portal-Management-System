<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Student Dashboard - CareerFlow')}">
<body>
    <div th:fragment="content">
        <div class="dashboard-container">
            <aside class="sidebar">
                <nav-side>
                    <h3 style="margin-bottom: 2rem; color: var(--primary);">Menu</h3>
                    <ul style="list-style: none;">
                        <li style="margin-bottom: 1rem;"><a th:href="@{/student/dashboard}" style="color: var(--primary); text-decoration: none; font-weight: 700;">My Dashboard</a></li>
                        <li style="margin-bottom: 1rem;"><a th:href="@{/jobs}" style="color: var(--text); text-decoration: none;">Browse Jobs</a></li>
                        <li style="margin-bottom: 1rem;"><a th:href="@{/profile}" style="color: var(--text); text-decoration: none;">Update Profile</a></li>
                    </ul>
                </nav-side>
            </aside>

            <main class="main-content">
                <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <div>
                        <h1 th:text="'Hello, ' + ${user.name}">Hello, Student</h1>
                        <p style="color: var(--text-muted);">Manage your applications and track status.</p>
                    </div>
                </header>

                <div class="stats-grid">
                    <div class="stat-card">
                        <p>Applications</p>
                        <h3 th:text="${#lists.size(applications)}">0</h3>
                    </div>
                </div>

                <div class="card" style="padding: 0; overflow: hidden;">
                    <div style="padding: 1.5rem; border-bottom: 1px solid var(--glass-border);">
                        <h3>My Applications</h3>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Job Title</th>
                                    <th>Employer</th>
                                    <th>Applied On</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="app : ${applications}">
                                    <td th:text="${app.job.title}">Software Engineer</td>
                                    <td th:text="${app.job.employer.name}">Google</td>
                                    <td th:text="${#temporals.format(app.appliedAt, 'dd MMM yyyy')}">15 Apr 2024</td>
                                    <td>
                                        <span th:class="'badge badge-' + ${#strings.toLowerCase(app.status)}" th:text="${app.status}">APPLIED</span>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(applications)}">
                                    <td colspan="4" style="text-align: center; padding: 2rem; color: var(--text-muted);">You haven't applied to any jobs yet.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
