<!DOCTYPE html>
<html th:replace="~{layout :: layout(~{::content}, 'Login - CareerFlow')}">
<body>
    <div th:fragment="content" style="max-width: 400px; margin: 5rem auto; padding: 0 1rem;">
        <div class="card">
            <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
            
            <div th:if="${param.error}" style="background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger); padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1.5rem; color: var(--danger);">
                Invalid email or password.
            </div>
            
            <div th:if="${param.logout}" style="background: rgba(16, 185, 129, 0.2); border: 1px solid var(--success); padding: 0.75rem; border-radius: var(--radius); margin-bottom: 1.5rem; color: var(--success);">
                You have been logged out.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="username" class="form-control" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Sign In</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
                Don't have an account? <a th:href="@{/register}" style="color: var(--primary);">Register</a>
            </p>
        </div>
    </div>
</body>
</html>
